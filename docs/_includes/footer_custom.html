<script>
(function(){
  function ensureThemeToggle() {
    var button = document.querySelector('.theme-toggle');
    if (!button) {
      button = document.createElement('button');
      button.className = 'theme-toggle';
      button.type = 'button';
    }

    var navList = document.querySelector('.aux-nav-list');
    if (navList) {
      var item = navList.querySelector('.theme-toggle-item');
      if (!item) {
        item = document.createElement('li');
        item.className = 'aux-nav-list-item theme-toggle-item';
        navList.appendChild(item);
      }
      if (button.parentNode !== item) {
        item.appendChild(button);
      }
    } else if (!button.parentNode) {
      document.body.appendChild(button);
    }

    var savedTheme = localStorage.getItem('theme');
    if (savedTheme !== 'light' && savedTheme !== 'dark') {
      savedTheme = 'dark';
      localStorage.setItem('theme', 'dark');
    }
    var isLight = savedTheme === 'light';
    document.body.classList.toggle('light-mode', isLight);

    function updateLabel(lightMode) {
      var icon = lightMode ? '🌙' : '☀';
      var label = lightMode ? 'Switch to dark mode' : 'Switch to light mode';
      button.innerHTML = '<span class="theme-toggle-icon" aria-hidden="true">' + icon + '</span>';
      button.setAttribute('aria-label', label);
      button.setAttribute('title', label);
    }

    updateLabel(isLight);

    button.onclick = function() {
      document.body.classList.toggle('light-mode');
      var nextIsLight = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', nextIsLight ? 'light' : 'dark');
      updateLabel(nextIsLight);
    };
  }

  function ensureMaintainerFooter() {
    var footer = document.querySelector('.side-bar .site-footer');
    if (!footer) return;
    footer.style.setProperty('display', 'block', 'important');

    if (footer.textContent.indexOf('Lokesh Venkatachalam') !== -1) return;

    var maintainer = document.createElement('div');
    maintainer.className = 'site-footer-maintainer';
    maintainer.innerHTML = 'Maintained by <a href="https://github.com/LokeshVenkatachalam">Lokesh Venkatachalam</a>';
    footer.insertBefore(maintainer, footer.firstChild);
  }

  function getHeaderRow(table) {
    if (table.tHead && table.tHead.rows.length) return table.tHead.rows[0];
    return table.rows.length ? table.rows[0] : null;
  }

  function getBodyRows(table) {
    if (table.tBodies && table.tBodies.length) {
      return Array.prototype.slice.call(table.tBodies[0].rows);
    }
    return Array.prototype.slice.call(table.rows, 1);
  }

  function getCellText(row, index) {
    var cell = row.cells[index];
    return cell ? cell.textContent.trim() : '';
  }

  function parseNumericValue(text) {
    if (!text) return NaN;
    var cleaned = text.trim().replace(/,/g, '');
    var match = cleaned.match(/^[-+]?\d+(?:\.\d+)?/);
    if (!match) return NaN;

    var value = parseFloat(match[0]);
    if (/ms\b/i.test(cleaned)) return value;
    if (/s\b/i.test(cleaned) && !/ms\b/i.test(cleaned)) return value * 1000;
    if (/gb\b/i.test(cleaned)) return value * 1e9;
    if (/mb\b/i.test(cleaned) && !/ms\b/i.test(cleaned)) return value * 1e6;
    if (/kb\b/i.test(cleaned)) return value * 1e3;
    if (/m\b/i.test(cleaned) && !/ms\b/i.test(cleaned)) return value * 1e6;
    if (/k\b/i.test(cleaned)) return value * 1e3;
    return value;
  }

  function isNumericColumn(rows, index) {
    var total = 0;
    var numeric = 0;

    rows.forEach(function(row) {
      var text = getCellText(row, index);
      if (!text) return;
      total += 1;
      if (!isNaN(parseNumericValue(text))) numeric += 1;
    });

    return total > 0 && numeric >= Math.max(2, Math.ceil(total / 2));
  }

  function sortTableByColumn(table, index) {
    var headerRow = getHeaderRow(table);
    if (!headerRow) return;

    var headers = Array.prototype.slice.call(headerRow.cells);
    var activeHeader = headers[index];
    var direction = activeHeader.getAttribute('aria-sort') === 'ascending' ? 'descending' : 'ascending';
    var rows = getBodyRows(table);
    if (rows.length < 2) return;

    var numeric = isNumericColumn(rows, index);
    headers.forEach(function(header) {
      header.removeAttribute('aria-sort');
    });
    activeHeader.setAttribute('aria-sort', direction);

    rows.sort(function(rowA, rowB) {
      var textA = getCellText(rowA, index);
      var textB = getCellText(rowB, index);

      if (numeric) {
        var valueA = parseNumericValue(textA);
        var valueB = parseNumericValue(textB);
        if (isNaN(valueA) && isNaN(valueB)) return 0;
        if (isNaN(valueA)) return 1;
        if (isNaN(valueB)) return -1;
        return direction === 'ascending' ? valueA - valueB : valueB - valueA;
      }

      var comparison = textA.localeCompare(textB, undefined, { numeric: true, sensitivity: 'base' });
      return direction === 'ascending' ? comparison : -comparison;
    });

    var body = table.tBodies && table.tBodies.length ? table.tBodies[0] : table;
    rows.forEach(function(row) {
      body.appendChild(row);
    });
  }

  function makeTablesSortable() {
    document.querySelectorAll('.main-content table').forEach(function(table) {
      if (table.dataset.sortReady === 'true') return;

      var headerRow = getHeaderRow(table);
      if (!headerRow || headerRow.cells.length < 2) return;

      table.classList.add('sortable-table');
      Array.prototype.forEach.call(headerRow.cells, function(headerCell, index) {
        headerCell.setAttribute('title', 'Click to sort');
        headerCell.setAttribute('tabindex', '0');
        headerCell.setAttribute('role', 'button');

        headerCell.addEventListener('click', function() {
          sortTableByColumn(table, index);
        });

        headerCell.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            sortTableByColumn(table, index);
          }
        });
      });

      table.dataset.sortReady = 'true';
    });
  }

  function initSiteEnhancements() {
    ensureThemeToggle();
    ensureMaintainerFooter();
    makeTablesSortable();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSiteEnhancements);
  } else {
    initSiteEnhancements();
  }
  window.addEventListener('load', initSiteEnhancements);
})();
</script>
