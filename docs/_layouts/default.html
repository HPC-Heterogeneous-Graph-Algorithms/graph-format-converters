<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --border: #30363d;
      --link: #58a6ff;
      --link-hover: #79c0ff;
      --code-bg: #1c2128;
      --header-bg: #0f1923;
      --header-gradient-start: #155799;
      --header-gradient-end: #0d1117;
      --table-alt: #161b22;
      --toggle-bg: #30363d;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --bg-secondary: #f6f8fa;
      --text: #1f2328;
      --text-muted: #656d76;
      --border: #d0d7de;
      --link: #0969da;
      --link-hover: #0550ae;
      --code-bg: #f6f8fa;
      --header-bg: #f0f5fa;
      --header-gradient-start: #155799;
      --header-gradient-end: #0d2f51;
      --table-alt: #f6f8fa;
      --toggle-bg: #d0d7de;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }

    .page-header {
      background: linear-gradient(135deg, var(--header-gradient-start), var(--header-gradient-end));
      padding: 2rem 1rem;
      text-align: center;
      position: relative;
    }

    .page-header h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      color: #fff;
    }

    .page-header p {
      margin: 0;
      color: rgba(255,255,255,0.75);
      font-size: 1.1rem;
    }

    /* Theme toggle */
    .theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: rgba(255,255,255,0.25);
    }

    .theme-toggle .icon { font-size: 1rem; }

    .main-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Markdown body styling */
    .markdown-body {
      background: transparent !important;
      color: var(--text) !important;
      font-size: 16px;
    }

    .markdown-body h1, .markdown-body h2, .markdown-body h3,
    .markdown-body h4, .markdown-body h5, .markdown-body h6 {
      color: var(--text) !important;
      border-bottom-color: var(--border) !important;
    }

    .markdown-body a { color: var(--link) !important; }
    .markdown-body a:hover { color: var(--link-hover) !important; }

    .markdown-body code, .markdown-body tt {
      background: var(--code-bg) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px;
      padding: 0.15em 0.4em;
    }

    .markdown-body pre {
      background: var(--code-bg) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
    }

    .markdown-body pre code {
      border: none !important;
      padding: 0;
      background: transparent !important;
    }

    .markdown-body table {
      border-collapse: collapse;
      width: 100%;
    }

    .markdown-body table th, .markdown-body table td {
      border: 1px solid var(--border) !important;
      padding: 8px 12px;
    }

    .markdown-body table th {
      background: var(--bg-secondary) !important;
      color: var(--text) !important;
    }

    .markdown-body table tr:nth-child(even) {
      background: var(--table-alt) !important;
    }

    .markdown-body table tr {
      background: var(--bg) !important;
      border-top-color: var(--border) !important;
    }

    .markdown-body blockquote {
      border-left-color: var(--border) !important;
      color: var(--text-muted) !important;
    }

    .markdown-body hr {
      background-color: var(--border) !important;
    }

    .markdown-body img {
      background: transparent !important;
    }

    .site-footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    .site-footer a { color: var(--link); }

    @media (max-width: 600px) {
      .page-header h1 { font-size: 1.5rem; }
      .theme-toggle { top: 0.5rem; right: 0.5rem; padding: 4px 10px; font-size: 0.8rem; }
      .main-content { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>{{ site.title | default: page.title }}</h1>
    <p>{{ site.description }}</p>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark/light mode">
      <span class="icon" id="theme-icon">☀️</span>
      <span id="theme-label">Light</span>
    </button>
  </header>

  <main class="main-content markdown-body">
    {{ content }}
  </main>

  <footer class="site-footer">
    Maintained by <a href="https://github.com/LokeshVenkatachalam">Lokesh Venkatachalam</a> · <a href="https://github.com/HPC-Heterogeneous-Graph-Algorithms/graph-format-converters">View on GitHub</a>
  </footer>

  <script>
    function getTheme() {
      return localStorage.getItem('theme') || 'dark';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('theme-icon').textContent = theme === 'dark' ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = theme === 'dark' ? 'Light' : 'Dark';
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
    }

    // Apply saved theme on load (default: dark)
    applyTheme(getTheme());
  </script>
</body>
</html>
